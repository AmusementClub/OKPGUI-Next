name: Draft Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Git tag to create or use for the draft release
        required: true
        type: string
      release_name:
        description: Optional release title
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }} asset
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            slug: windows-x64
            binary_name: okpgui-next.exe
            mediainfo_target: x86_64-pc-windows-msvc
            mediainfo_staged: mediainfo-x86_64-pc-windows-msvc.exe
            archive_name: okpgui-next-${{ github.event.inputs.tag_name }}-windows-x64.zip
          - name: macOS x64
            os: macos-13
            slug: macos-x64
            binary_name: okpgui-next
            mediainfo_target: x86_64-apple-darwin
            mediainfo_staged: mediainfo-x86_64-apple-darwin
            archive_name: okpgui-next-${{ github.event.inputs.tag_name }}-macos-x64.tar.gz
          - name: macOS arm64
            os: macos-latest
            slug: macos-arm64
            binary_name: okpgui-next
            mediainfo_target: aarch64-apple-darwin
            mediainfo_staged: mediainfo-aarch64-apple-darwin
            archive_name: okpgui-next-${{ github.event.inputs.tag_name }}-macos-arm64.tar.gz
          - name: Linux
            os: ubuntu-22.04
            slug: linux-x64
            binary_name: okpgui-next
            mediainfo_target: x86_64-unknown-linux-gnu
            mediainfo_staged: mediainfo-x86_64-unknown-linux-gnu
            archive_name: okpgui-next-${{ github.event.inputs.tag_name }}-linux-x64.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: BYOK release gates (offline packaging + honesty)
        run: node scripts/verify-byok-release-gates.mjs

      - name: MediaInfo sidecar inventory gate
        run: node scripts/verify-mediainfo-package.mjs --manifest-only

      - name: Stage MediaInfo sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/stage-mediainfo.ps1 -Target '${{ matrix.platform.mediainfo_target }}'
          node scripts/verify-mediainfo-package.mjs --target '${{ matrix.platform.mediainfo_target }}'

      - name: Stage MediaInfo sidecar (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x scripts/stage-mediainfo.sh
          ./scripts/stage-mediainfo.sh '${{ matrix.platform.mediainfo_target }}'
          node scripts/verify-mediainfo-package.mjs --target '${{ matrix.platform.mediainfo_target }}'

      - name: Cargo fmt gate
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Cargo clippy gate
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Offline provider/security contract gate
        run: |
          node scripts/verify-provider-contract.mjs
          cargo test --manifest-path src-tauri/Cargo.toml provider_contract -- --nocapture

      - name: Offline UI integration inventory gate
        run: node scripts/verify-ui-integration-inventory.mjs

      - name: Run frontend tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Playwright browser/UI integration (mocked Tauri IPC; not desktop E2E)
        run: |
          # Browser/UI integration with mocked Tauri IPC only (not desktop E2E).
          pnpm run test:ui-integration

      - name: Run backend tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri application binary
        run: pnpm tauri build --no-bundle

      - name: Desktop E2E / macOS packaged smoke (platform-limited notice)
        if: runner.os == 'Linux'
        run: |
          echo "::notice title=Platform-limited gates::Release packaging asserts sidecar/archive membership below. Windows/Linux desktop WebDriver E2E and macOS packaged IPC/keyring smoke remain platform-limited (no in-repo harness)."

      - name: Package Windows asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stagingDir = Join-Path $env:RUNNER_TEMP 'release-windows'
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null
          Copy-Item "src-tauri/target/release/${{ matrix.platform.binary_name }}" (Join-Path $stagingDir '${{ matrix.platform.binary_name }}')
          # Package sidecar + redistribution notice alongside the app binary.
          Copy-Item "src-tauri/binaries/${{ matrix.platform.mediainfo_staged }}" (Join-Path $stagingDir '${{ matrix.platform.mediainfo_staged }}')
          $noticeDir = Join-Path $stagingDir 'mediainfo'
          New-Item -ItemType Directory -Path $noticeDir -Force | Out-Null
          Copy-Item "src-tauri/resources/mediainfo/THIRD_PARTY_NOTICES.html" (Join-Path $noticeDir 'THIRD_PARTY_NOTICES.html')
          Compress-Archive -Path (Join-Path $stagingDir '*') -DestinationPath "${{ matrix.platform.archive_name }}" -Force
          # Fail-closed membership gate: app binary, target-named sidecar, notice.
          node scripts/verify-release-archive.mjs `
            --archive "${{ matrix.platform.archive_name }}" `
            --binary "${{ matrix.platform.binary_name }}" `
            --sidecar "${{ matrix.platform.mediainfo_staged }}" `
            --notice "mediainfo/THIRD_PARTY_NOTICES.html"

      - name: Package Unix asset
        if: runner.os != 'Windows'
        run: |
          staging_dir="${RUNNER_TEMP}/release-${{ matrix.platform.slug }}"
          mkdir -p "$staging_dir/mediainfo"
          cp "src-tauri/target/release/${{ matrix.platform.binary_name }}" "$staging_dir/${{ matrix.platform.binary_name }}"
          # Package sidecar + redistribution notice alongside the app binary.
          cp "src-tauri/binaries/${{ matrix.platform.mediainfo_staged }}" "$staging_dir/${{ matrix.platform.mediainfo_staged }}"
          cp "src-tauri/resources/mediainfo/THIRD_PARTY_NOTICES.html" "$staging_dir/mediainfo/THIRD_PARTY_NOTICES.html"
          tar -C "$staging_dir" -czf "${{ matrix.platform.archive_name }}" .
          # Fail-closed membership gate: app binary, target-named sidecar, notice.
          node scripts/verify-release-archive.mjs \
            --archive "${{ matrix.platform.archive_name }}" \
            --binary "${{ matrix.platform.binary_name }}" \
            --sidecar "${{ matrix.platform.mediainfo_staged }}" \
            --notice "mediainfo/THIRD_PARTY_NOTICES.html"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform.slug }}-release-asset
          if-no-files-found: error
          path: ${{ matrix.platform.archive_name }}

  release:
    name: Create draft GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v6
        with:
          path: release-assets

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: ${{ github.event.inputs.release_name != '' && github.event.inputs.release_name || github.event.inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          draft: true
          generate_release_notes: true
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
