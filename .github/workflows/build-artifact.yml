name: Build Artifact

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform.name }} Artifact
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            artifact_name: okpgui-next-windows-artifact
            mediainfo_target: x86_64-pc-windows-msvc
          - name: macOS x64
            os: macos-13
            artifact_name: okpgui-next-macos-x64-artifact
            mediainfo_target: x86_64-apple-darwin
          - name: macOS arm64
            os: macos-latest
            artifact_name: okpgui-next-macos-arm64-artifact
            mediainfo_target: aarch64-apple-darwin
          - name: Linux
            os: ubuntu-22.04
            artifact_name: okpgui-next-linux-artifact
            mediainfo_target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: MediaInfo sidecar inventory gate
        run: node scripts/verify-mediainfo-package.mjs --manifest-only

      - name: Stage MediaInfo sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/stage-mediainfo.ps1 -Target '${{ matrix.platform.mediainfo_target }}'
          node scripts/verify-mediainfo-package.mjs --target '${{ matrix.platform.mediainfo_target }}'

      - name: Stage MediaInfo sidecar (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x scripts/stage-mediainfo.sh
          ./scripts/stage-mediainfo.sh '${{ matrix.platform.mediainfo_target }}'
          node scripts/verify-mediainfo-package.mjs --target '${{ matrix.platform.mediainfo_target }}'

      - name: Cargo fmt gate
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Cargo clippy gate
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Run frontend tests
        run: pnpm test

      - name: Run frontend build
        run: pnpm build

      - name: Run backend tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri application
        run: pnpm tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform.artifact_name }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/release/okpgui-next*
            src-tauri/binaries/mediainfo-${{ matrix.platform.mediainfo_target }}
            src-tauri/binaries/mediainfo-${{ matrix.platform.mediainfo_target }}.exe
            src-tauri/resources/mediainfo/THIRD_PARTY_NOTICES.html
